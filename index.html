const h = (tag, attrs, ...ch) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  ch.flat(9).forEach(c => { if (c != null) el.append(typeof c === 'string' ? c : c); });
  return el;
};

/* ═══ GitHub DB ═══ */
class GDB {
  constructor(o,r,t,p="data.json"){ this.o=o; this.r=r; this.t=t; this.p=p; this.sha=null; }
  get hd(){ return {"Authorization":`Bearer ${this.t}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"}; }
  get url(){ return `https://api.github.com/repos/${this.o}/${this.r}/contents/${this.p}`; }
  async read(){
    const res = await fetch(this.url,{headers:this.hd});
    if(res.status===404){ this.sha=null; return null; }
    if(!res.ok) throw new Error(`GitHub ${res.status}`);
    const j = await res.json(); this.sha = j.sha;
    return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(j.content.replace(/\n/g,"")),(c)=>c.charCodeAt(0))));
  }
  async write(data){
    const body = { message:`Yangilandi — ${new Date().toLocaleString("uz-UZ")}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))) };
    if(this.sha) body.sha = this.sha;
    const res = await fetch(this.url,{method:"PUT",headers:this.hd,body:JSON.stringify(body)});
    if(res.status===409){ await this.read(); return this.write(data); }
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.message||`GitHub ${res.status}`); }
    this.sha = (await res.json()).content.sha;
  }
  async test(){
    const res = await fetch(`https://api.github.com/repos/${this.o}/${this.r}`,{headers:this.hd});
    if(!res.ok) throw new Error(res.status===404?"Repo topilmadi":res.status===401?"Token noto'g'ri":`Xatolik ${res.status}`);
    const rp = await res.json();
    if(!rp.permissions?.push) throw new Error("Token yozish huquqiga ega emas");
  }
}

function toast(msg, type="ok"){

}

async function loadData(){
  render(); // show loading
  try {
    const result = await db.read();
    D = result ? {...EMPTY, ...result} : {...EMPTY};
    if(!result) await db.write(D);
  } catch(e) {
    toast("Xatolik: "+e.message,"error");
    D = {...EMPTY};
  }
  currentView = "home";
  render();
}

async function saveData(){
  if(!db) return;
  saving = true; render();
  try { await db.write(D); } catch(e){ toast("Saqlashda xatolik: "+e.message,"error"); }
  saving = false; render();
}

/* ═══ Helpers ═══ */
async function detectMediaType(file){
  const b = new Uint8Array(await file.slice(0,12).arrayBuffer());
  if(b[0]===0x89&&b[1]===0x50&&b[2]===0x4E&&b[3]===0x47) return "image/png";
  if(b[0]===0xFF&&b[1]===0xD8&&b[2]===0xFF) return "image/jpeg";
  if(b[0]===0x47&&b[1]===0x49&&b[2]===0x46) return "image/gif";
  if(b[0]===0x52&&b[1]===0x49&&b[2]===0x46&&b[3]===0x46&&b[8]===0x57&&b[9]===0x45&&b[10]===0x42&&b[11]===0x50) return "image/webp";
  if(b[0]===0x25&&b[1]===0x50&&b[2]===0x44&&b[3]===0x46) return "application/pdf";
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==="png") return "image/png";
  if(ext==="webp") return "image/webp";
  if(ext==="gif") return "image/gif";
  if(ext==="pdf") return "application/pdf";
  return "image/jpeg";
}

function badge(val, mn, mx){

  const v=parseFloat(val); if(isNaN(v)) return "";
  const ok = v>=mn && v<=mx;
  return `<span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:${ok?"var(--acl)":"var(--dnl)"};color:${ok?"var(--ac)":"var(--dn)"}">${ok?"Norma":v<mn?"Past ↓":"Yuqori ↑"}</span>`;
}

/* ═══ Modal helper ═══ */
function showModal(title, contentFn){
  $$('.overlay').forEach(o=>o.remove());
  const overlay = h('div',{className:'overlay'});
  const modal = h('div',{className:'modal fi'});
  const header = h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}},

  );
  modal.append(header);
  contentFn(modal, ()=>overlay.remove());
  overlay.append(modal);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.append(overlay);
}

}

  options.forEach(([v,t])=>{ const o=h('option',{value:v},t); s.append(o); });

  return h('button',{style:s,onClick},text);
}

let aiResult = "";
let aiLoading = false;

async function runAI(mid){
  if(!cfg.aiKey){ showAIKey(); return; }
  const m = getMember(mid); if(!m) return;
  aiLoading=true; aiResult=""; currentView="ai"; render();

  const tests = mTests(mid);
  const visits = mVisits(mid);
  const tSum = tests.map(t=>{const tt=getTest(t.tid);return `${fmtD(t.date)}: ${tt?.name||"?"} = ${t.value} ${tt?.unit||""} (norma: ${tt?.min}-${tt?.max})`;}).join("\n");
  const vSum = visits.map(v=>{const dt=getDoc(v.did);return `${fmtD(v.date)}: ${dt?.name||"?"} — ${v.diagnosis||""}. ${v.notes||""}`;}).join("\n");
  const age = m.birthYear?(new Date().getFullYear()-m.birthYear):null;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
        messages:[{role:"user",content:`Sen tajribali oilaviy shifokor yordamchisisan. O'zbek tilida tahlil qil:
Bemor: ${m.name}, ${age?age+" yosh":"yoshi noma'lum"}, ${m.gender||""}
TAHLILLAR:\n${tSum||"(yo'q)"}
KO'RIKLAR:\n${vSum||"(yo'q)"}
1. 📊 UMUMIY XULOSA  2. ⚠️ OGOHLANTIRISH  3. 📅 TAVSIYALAR  4. 💊 SOGLOM TURMUSH  5. 🔔 ESLATMA
Oxirida: "Bu AI umumiy ma'lumot, shifokor maslahatini almashtirmaydi."`}]
      })
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
    aiResult = d.content?.map(c=>c.text||"").join("\n")||"Natija olinmadi";
  }catch(e){ aiResult="Xatolik: "+e.message; }
  aiLoading=false; render();
}

function showUploadTest(mid){
  if(!cfg?.aiKey){ showAIKey(); toast("Avval AI kalitini kiriting","error"); return; }
  showModal("📄 Tahlil faylini yuklash",(modal,close)=>{
    modal.append(h('div',{style:{fontSize:"13px",color:"var(--tx2)",lineHeight:"1.6",marginBottom:"16px"}},"Tahlil natijasi rasmini yoki PDF faylini yuklang. AI avtomatik o'qib, barcha ko'rsatkichlarni chiqarib beradi."));

    const dropZone = h('div',{style:{border:"2px dashed var(--br)",borderRadius:"var(--rl)",padding:"30px 20px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",background:"var(--sec)"}});
    const fileInput = h('input',{type:"file",accept:"image/*,.pdf",style:{display:"none"}});
    const fileLabel = h('div');
    fileLabel.append(h('div',{style:{fontSize:"32px",marginBottom:"8px",opacity:"0.4"}},"📎"));
    fileLabel.append(h('div',{style:{fontSize:"14px",fontWeight:"600",color:"var(--tx2)",marginBottom:"4px"}},"Rasm yoki PDF tanlang"));
    fileLabel.append(h('div',{style:{fontSize:"12px",color:"var(--tx3)"}},"JPG, PNG, PDF formatlar"));
    dropZone.append(fileLabel);
    dropZone.addEventListener('click',()=>fileInput.click());
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor="var(--ac)";dropZone.style.background="var(--acl)";});
    dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor="var(--br)";dropZone.style.background="var(--sec)";});
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor="var(--br)";dropZone.style.background="var(--sec)";if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
    modal.append(dropZone);
    modal.append(fileInput);

    const iDate=makeInput("date"); iDate.value=new Date().toISOString().split("T")[0];
    modal.append(h('div',{style:{marginTop:"16px"}},field("Tahlil sanasi",iDate)));

    const statusDiv = h('div',{style:{display:"none",marginTop:"16px"}});
    modal.append(statusDiv);

    const resultsDiv = h('div',{style:{display:"none",marginTop:"16px"}});
    modal.append(resultsDiv);

    fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) processFile(fileInput.files[0]); });

    async function processFile(file){
      // Validate
      const ext = file.name.split('.').pop().toLowerCase();
      const validImg = ['jpg','jpeg','png','webp','gif'];
      const validDoc = ['pdf'];
      if(!validImg.includes(ext) && !validDoc.includes(ext)){
        toast("Faqat rasm (JPG/PNG) yoki PDF yuklang","error"); return;
      }
      if(file.size > 20*1024*1024){ toast("Fayl hajmi 20MB dan kichik bo'lishi kerak","error"); return; }

      // Show file name
      fileLabel.innerHTML = '';
      fileLabel.append(h('div',{style:{fontSize:"14px",fontWeight:"600",color:"var(--ac)"}},"✓ "+file.name));
      fileLabel.append(h('div',{style:{fontSize:"12px",color:"var(--tx3)",marginTop:"4px"}},(file.size/1024).toFixed(0)+" KB"));

      // Show loading
      statusDiv.style.display = "block";
      statusDiv.innerHTML = '';
      statusDiv.append(h('div',{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px",background:"var(--infl)",borderRadius:"var(--r)"}},
        h('div',{style:{width:"20px",height:"20px",border:"2px solid var(--br)",borderTopColor:"var(--inf)",borderRadius:"50%",animation:"sp 0.7s linear infinite",flexShrink:"0"}}),
        h('div',{style:{fontSize:"13px",color:"var(--inf)",fontWeight:"500"}},"AI tahlil natijalarini o'qimoqda...")
      ));

      // Read file as base64
      const base64 = await new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error("Fayl o'qishda xatolik"));
        reader.readAsDataURL(file);
      });

      // Detect actual media type from file content (not extension)
      const mediaType = await detectMediaType(file);

      // Build content for Claude
      const contentBlock = mediaType==="application/pdf" ?
        { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } } :
        { type:"image", source:{ type:"base64", media_type:mediaType, data:base64 } };

      // Known test types for matching
      const knownTypes = D.testTypes.map(t=>({id:t.id,name:t.name,unit:t.unit,min:t.min,max:t.max}));

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514", max_tokens:2000,
            messages:[{role:"user",content:[
              contentBlock,
              {type:"text",text:`Bu laboratoriya tahlili natijasi. Iltimos, barcha ko'rsatkichlarni o'qib, JSON formatda chiqar.

Tizimdagi mavjud tahlil turlari:
${JSON.stringify(knownTypes)}

MUHIM QOIDALAR:
- Agar ko'rsatkich tizimdagi tahlil turiga mos kelsa, o'sha "id" ni ishlat
- Agar mos kelmasa, "id" ni null qil va "newName", "newUnit", "newMin", "newMax" maydonlarini to'ldir
- Faqat JSON qaytar, boshqa hech narsa yozma
- Raqamlarni to'g'ri o'qi

Javob formati (faqat JSON, boshqa text yo'q):
[
  {"id":"t1","value":5.4,"note":""},
  {"id":null,"value":12.3,"newName":"Kreatinin","newUnit":"mkmol/l","newMin":44,"newMax":97,"note":""}
]`}
            ]}]
          })
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);

        const text = data.content?.map(c=>c.text||"").join("")||"";
        // Extract JSON from response
        let jsonStr = text.trim();
        const jsonMatch = jsonStr.match(/\[[\s\S]*\]/);
        if(!jsonMatch) throw new Error("AI natija qaytarmadi");
        const results = JSON.parse(jsonMatch[0]);

        if(!Array.isArray(results)||results.length===0) throw new Error("Tahlil natijalari topilmadi");

        // Show results for confirmation
        statusDiv.style.display = "none";
        resultsDiv.style.display = "block";
        resultsDiv.innerHTML = '';
        resultsDiv.append(h('div',{style:{fontSize:"14px",fontWeight:"700",marginBottom:"10px"}},"Topilgan natijalar:"));

        const checkboxes = [];
        results.forEach((r,i)=>{
          const existing = r.id ? getTest(r.id) : null;
          const name = existing ? existing.name : (r.newName||"Noma'lum");
          const unit = existing ? existing.unit : (r.newUnit||"");
          const mn = existing ? existing.min : (r.newMin??null);
          const mx = existing ? existing.max : (r.newMax??null);

          const row = h('div',{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",background:"var(--card)",border:"1px solid var(--br)",borderRadius:"var(--r)",marginBottom:"6px"}});
          const cb = h('input',{type:"checkbox",checked:"true",style:{width:"18px",height:"18px",accentColor:"var(--ac)",flexShrink:"0"}});
          cb.checked = true;
          checkboxes.push({cb,r,existing,name,unit,mn,mx});

          const info = h('div',{style:{flex:"1",minWidth:"0"}});
          info.append(h('div',{style:{fontWeight:"600",fontSize:"13px"}},name));
          if(!existing) info.append(h('div',{style:{fontSize:"11px",color:"var(--inf)",fontWeight:"500"}},"Yangi tahlil turi"));
          const right = h('div',{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}});
          right.append(h('span',{html:`<b style="font-size:15px">${r.value}</b> <span style="font-size:11px;color:var(--tx3)">${unit}</span>`}));
          right.append(h('span',{html:badge(r.value,mn,mx)}));

          row.append(cb); row.append(info); row.append(right);
          resultsDiv.append(row);
        });

        resultsDiv.append(h('div',{style:{marginTop:"14px"}},
          btn("✓ Belgilanganlarni saqlash",()=>{
            const date = iDate.value;
            let saved = 0;
            checkboxes.forEach(({cb,r,existing,name,unit,mn,mx})=>{
              if(!cb.checked) return;
              let tid = r.id;
              // If new test type, create it
              if(!tid || !existing){
                tid = uid();
                D.testTypes.push({id:tid,name:name,unit:unit,min:mn,max:mx});
              }
              D.tests.push({id:uid(),mid,tid,value:r.value,date,note:r.note||""});
              saved++;
            });
            if(saved>0){
              saveData();
              toast(`${saved} ta natija saqlandi!`);
            }
            close(); render();
          },{full:true})
        ));

      } catch(e){
        statusDiv.innerHTML = '';
        statusDiv.append(h('div',{style:{padding:"12px",background:"var(--dnl)",borderRadius:"var(--r)",fontSize:"13px",color:"var(--dn)",fontWeight:"500"}},"Xatolik: "+e.message));
      }
    }
  });
}

function showUploadVisit(mid){
  if(!cfg?.aiKey){ showAIKey(); toast("Avval AI kalitini kiriting","error"); return; }
  showModal("📄 Ko'rik faylini yuklash",(modal,close)=>{
    modal.append(h('div',{style:{fontSize:"13px",color:"var(--tx2)",lineHeight:"1.6",marginBottom:"16px"}},"Shifokor ko'rigi, retsept yoki tibbiy xulosani yuklang. AI avtomatik o'qib, ma'lumotlarni chiqarib beradi."));

    const dropZone = h('div',{style:{border:"2px dashed var(--br)",borderRadius:"var(--rl)",padding:"30px 20px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",background:"var(--sec)"}});
    const fileInput = h('input',{type:"file",accept:"image/*,.pdf,.docx,.doc",style:{display:"none"}});
    const fileLabel = h('div');
    fileLabel.append(h('div',{style:{fontSize:"32px",marginBottom:"8px",opacity:"0.4"}},"📎"));
    fileLabel.append(h('div',{style:{fontSize:"14px",fontWeight:"600",color:"var(--tx2)",marginBottom:"4px"}},"Rasm, PDF yoki DOCX tanlang"));
    fileLabel.append(h('div',{style:{fontSize:"12px",color:"var(--tx3)"}},"JPG, PNG, PDF, DOCX formatlar"));
    dropZone.append(fileLabel);
    dropZone.addEventListener('click',()=>fileInput.click());
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor="var(--ac)";dropZone.style.background="var(--acl)";});
    dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor="var(--br)";dropZone.style.background="var(--sec)";});
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor="var(--br)";dropZone.style.background="var(--sec)";if(e.dataTransfer.files[0])processVisitFile(e.dataTransfer.files[0]);});
    modal.append(dropZone);
    modal.append(fileInput);

    const statusDiv = h('div',{style:{display:"none",marginTop:"16px"}});
    modal.append(statusDiv);
    const resultsDiv = h('div',{style:{display:"none",marginTop:"16px"}});
    modal.append(resultsDiv);

    fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) processVisitFile(fileInput.files[0]); });

    async function extractDocxText(file){
      if(typeof JSZip==='undefined') throw new Error("DOCX kutubxonasi yuklanmadi, sahifani yangilang");
      const ab = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(ab);
      const xml = await zip.file("word/document.xml")?.async("text");
      if(!xml) throw new Error("DOCX fayl noto'g'ri format");
      const texts = [];
      for(const m of xml.matchAll(/<w:t[^>]*>([^<]*)<\/w:t>/g)){ if(m[1].trim()) texts.push(m[1]); }
      return texts.join(" ");
    }

    async function processVisitFile(file){
      const ext = file.name.split('.').pop().toLowerCase();
      const validImg = ['jpg','jpeg','png','webp','gif'];
      const validPdf = ['pdf'];
      const validDoc = ['docx','doc'];
      if(!validImg.includes(ext)&&!validPdf.includes(ext)&&!validDoc.includes(ext)){
        toast("Faqat JPG, PNG, PDF yoki DOCX yuklang","error"); return;
      }
      if(file.size>20*1024*1024){ toast("Fayl 20MB dan kichik bo'lishi kerak","error"); return; }

      fileLabel.innerHTML='';
      fileLabel.append(h('div',{style:{fontSize:"14px",fontWeight:"600",color:"var(--ac)"}},"✓ "+file.name));
      fileLabel.append(h('div',{style:{fontSize:"12px",color:"var(--tx3)",marginTop:"4px"}},(file.size/1024).toFixed(0)+" KB"));

      statusDiv.style.display="block"; statusDiv.innerHTML='';
      statusDiv.append(h('div',{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px",background:"var(--infl)",borderRadius:"var(--r)"}},
        h('div',{style:{width:"20px",height:"20px",border:"2px solid var(--br)",borderTopColor:"var(--inf)",borderRadius:"50%",animation:"sp 0.7s linear infinite",flexShrink:"0"}}),
        h('div',{style:{fontSize:"13px",color:"var(--inf)",fontWeight:"500"}},"AI ko'rik ma'lumotlarini o'qimoqda...")
      ));

      const knownDoctors = D.doctorTypes.map(d=>({id:d.id,name:d.name}));
      const promptText = `Bu shifokor ko'rigi hujjati. Quyidagi ma'lumotlarni JSON formatda chiqar.\n\nMavjud shifokor turlari:\n${JSON.stringify(knownDoctors)}\n\nQOIDALAR:\n- Shifokor turi mos kelsa "id" ni ishlat, mos kelmasa "id":null va "newDoctorName" ni to'ldir\n- Sanani YYYY-MM-DD formatda chiqar, topilmasa bugungi "${new Date().toISOString().split("T")[0]}"\n- Faqat JSON qaytar, boshqa text yozma\n\nFormat:\n{"id":"d1","newDoctorName":null,"date":"2026-04-30","diagnosis":"Tashxis","notes":"Tavsiyalar"}`;

      try {
        let messages;
        if(validDoc.includes(ext)){
          const docText = await extractDocxText(file);
          messages = [{role:"user",content:[{type:"text",text:`Hujjat matni:\n\n${docText}\n\n${promptText}`}]}];
        } else {
          const base64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error("Fayl o'qishda xatolik")); r.readAsDataURL(file); });
          const mt = await detectMediaType(file);
          const cb = mt==="application/pdf" ? {type:"document",source:{type:"base64",media_type:mt,data:base64}} : {type:"image",source:{type:"base64",media_type:mt,data:base64}};
          messages = [{role:"user",content:[cb,{type:"text",text:promptText}]}];
        }

        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages})
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        const text = data.content?.map(c=>c.text||"").join("")||"";
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("AI natija qaytarmadi");
        const result = JSON.parse(jsonMatch[0]);

        const existing = result.id ? getDoc(result.id) : null;
        const doctorName = existing ? existing.name : (result.newDoctorName||"Noma'lum shifokor");

        statusDiv.style.display="none";
        resultsDiv.style.display="block"; resultsDiv.innerHTML='';
        resultsDiv.append(h('div',{style:{fontSize:"14px",fontWeight:"700",marginBottom:"10px"}},"Topilgan ma'lumotlar:"));

        const card = h('div',{style:{background:"var(--card)",border:"1px solid var(--br)",borderRadius:"var(--rl)",padding:"14px",marginBottom:"10px"}});

        // Doctor select
        const dSel = h('select',{className:'inp',style:{fontSize:"13px",padding:"6px 10px",marginBottom:"10px"}});
        D.doctorTypes.forEach(d=>{ const o=h('option',{value:d.id},d.name); dSel.append(o); });
        if(!existing){ const o=h('option',{value:"__new"},"+ Yangi: "+doctorName); dSel.append(o); dSel.value="__new"; }
        else { dSel.value=result.id; }
        card.append(field("Shifokor turi",dSel));

        const dateInp = makeInput("date");
        dateInp.value = result.date||new Date().toISOString().split("T")[0];
        card.append(field("Sana",dateInp));

        const diagInp = makeInput("text","Tashxis");
        diagInp.value = result.diagnosis||"";
        card.append(field("Tashxis",diagInp));

        const notesInp = h('textarea',{className:'inp',placeholder:"Shifokor tavsiyalari..."});
        notesInp.value = result.notes||"";
        card.append(field("Tavsiyalar",notesInp));

        resultsDiv.append(card);
        resultsDiv.append(btn("✓ Saqlash",()=>{
          let did = dSel.value;
          if(did==="__new"){ did=uid(); D.doctorTypes.push({id:did,name:doctorName}); }
          D.visits.push({id:uid(),mid,did,date:dateInp.value,diagnosis:diagInp.value,notes:notesInp.value});
          saveData(); toast("Ko'rik saqlandi!"); close(); render();
        },{full:true}));

      } catch(e){
        statusDiv.innerHTML='';
        statusDiv.append(h('div',{style:{padding:"12px",background:"var(--dnl)",borderRadius:"var(--r)",fontSize:"13px",color:"var(--dn)",fontWeight:"500"}},"Xatolik: "+e.message));
      }
    }
  });
}
