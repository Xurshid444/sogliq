const h = (tag, attrs, ...ch) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  ch.flat(9).forEach(c => { if (c != null) el.append(typeof c === 'string' ? c : c); });
  return el;
};

/* ═══ GitHub DB ═══ */
class GDB {
  constructor(o,r,t,p="data.json"){ this.o=o; this.r=r; this.t=t; this.p=p; this.sha=null; }
  get hd(){ return {"Authorization":`Bearer ${this.t}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"}; }
  get url(){ return `https://api.github.com/repos/${this.o}/${this.r}/contents/${this.p}`; }
  async read(){
    const res = await fetch(this.url,{headers:this.hd});
    if(res.status===404){ this.sha=null; return null; }
    if(!res.ok) throw new Error(`GitHub ${res.status}`);
    const j = await res.json(); this.sha = j.sha;
    return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(j.content.replace(/\n/g,"")),(c)=>c.charCodeAt(0))));
  }
  async write(data){
    const body = { message:`Yangilandi — ${new Date().toLocaleString("uz-UZ")}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))) };
    if(this.sha) body.sha = this.sha;
    const res = await fetch(this.url,{method:"PUT",headers:this.hd,body:JSON.stringify(body)});
    if(res.status===409){ await this.read(); return this.write(data); }
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.message||`GitHub ${res.status}`); }
    this.sha = (await res.json()).content.sha;
  }
  async test(){
    const res = await fetch(`https://api.github.com/repos/${this.o}/${this.r}`,{headers:this.hd});
    if(!res.ok) throw new Error(res.status===404?"Repo topilmadi":res.status===401?"Token noto'g'ri":`Xatolik ${res.status}`);
    const rp = await res.json();
    if(!rp.permissions?.push) throw new Error("Token yozish huquqiga ega emas");
  }
}

/* ═══ Helpers ═══ */
async function pdfToImages(file, maxPages=15){
  if(typeof pdfjsLib==='undefined') throw new Error("PDF kutubxonasi yuklanmadi, sahifani yangilang");
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
  const total = Math.min(pdf.numPages, maxPages);
  const images = [];
  for(let i=1; i<=total; i++){
    const page = await pdf.getPage(i);
    const vp = page.getViewport({scale:1.5});
    const canvas = document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    images.push(canvas.toDataURL('image/jpeg',0.8).split(',')[1]);
  }
  return images;
}

async function detectMediaType(file){
  const b = new Uint8Array(await file.slice(0,12).arrayBuffer());
  if(b[0]===0x89&&b[1]===0x50&&b[2]===0x4E&&b[3]===0x47) return "image/png";
  if(b[0]===0xFF&&b[1]===0xD8&&b[2]===0xFF) return "image/jpeg";
  if(b[0]===0x47&&b[1]===0x49&&b[2]===0x46) return "image/gif";
  if(b[0]===0x52&&b[1]===0x49&&b[2]===0x46&&b[3]===0x46&&b[8]===0x57&&b[9]===0x45&&b[10]===0x42&&b[11]===0x50) return "image/webp";
  if(b[0]===0x25&&b[1]===0x50&&b[2]===0x44&&b[3]===0x46) return "application/pdf";
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==="png") return "image/png";
  if(ext==="webp") return "image/webp";
  if(ext==="gif") return "image/gif";
  if(ext==="pdf") return "application/pdf";
  return "image/jpeg";
}

/* ═══ SPARKLINE ═══ */
function makeSpark(values, color="#0f9e6e"){
  if(values.length<2) return null;
  const W=100, H=34;
  const mn=Math.min(...values), mx=Math.max(...values), rng=mx-mn||1;
  const pt = (v,i)=>`${(i/(values.length-1))*W},${H-((v-mn)/rng*(H*0.75)+H*0.1)}`;
  const pts = values.map((v,i)=>pt(v,i));
  const linePath = `M${pts.join("L")}`;
  const fillPath = `${linePath}L${W},${H}L0,${H}Z`;
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%"); svg.setAttribute("height","34");
  svg.setAttribute("preserveAspectRatio","none");
  const fp = document.createElementNS("http://www.w3.org/2000/svg","path");
  fp.setAttribute("d",fillPath); fp.setAttribute("fill",color+"22");
  const lp = document.createElementNS("http://www.w3.org/2000/svg","path");
  lp.setAttribute("d",linePath); lp.setAttribute("fill","none");
  lp.setAttribute("stroke",color); lp.setAttribute("stroke-width","2");
  lp.setAttribute("stroke-linecap","round"); lp.setAttribute("stroke-linejoin","round");
  const lastPt = pts[pts.length-1].split(",");
  const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
  dot.setAttribute("cx",lastPt[0]); dot.setAttribute("cy",lastPt[1]);
  dot.setAttribute("r","3"); dot.setAttribute("fill",color);
  svg.append(fp,lp,dot);
  return svg;
}

/* ═══ CHART MODAL ═══ */
function showChartModal(tt, results){
  if(chartInstance){ chartInstance.destroy(); chartInstance=null; }
  showModal(tt.name,(modal,close)=>{
    const sorted = [...results].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
    const isOk = v=>tt.min==null||(v>=tt.min&&v<=tt.max);
    const lineColor = sorted.every(r=>isOk(r.value))?"#0f9e6e":"#e8443a";
    const canvasWrap = h('div',{style:{position:"relative",width:"100%",height:"220px",marginBottom:"14px"}});
    const canvas = h('canvas');
    canvasWrap.append(canvas);
    modal.append(canvasWrap);
    // History list
    const hist = h('div',{style:{maxHeight:"200px",overflowY:"auto"}});
    [...sorted].reverse().forEach(r=>{
      const ok = isOk(r.value);
      const row = h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--br)"}});
      row.append(h('span',{style:{fontSize:"13px",color:"var(--tx2)"}}),fmtD(r.date));
      const right = h('div',{style:{display:"flex",alignItems:"center",gap:"8px"}});
      right.append(h('span',{style:{fontSize:"14px",fontWeight:"700"}}),`${r.value} `,h('span',{style:{fontSize:"11px",color:"var(--tx3)"}},tt.unit||""));
      right.append(h('span',{style:{fontSize:"10px",fontWeight:"700",padding:"2px 7px",borderRadius:"20px",background:ok?"var(--acl)":"var(--dnl)",color:ok?"var(--ac)":"var(--dn)"}},tt.min==null?"—":ok?"Norma":r.value>tt.max?"Yuqori":"Past"));
      row.append(right);
      hist.append(row);
    });
    modal.append(hist);
    setTimeout(()=>{
      chartInstance = new Chart(canvas,{
        type:'line',
        data:{
          labels:sorted.map(r=>fmtD(r.date)),
          datasets:[{
            data:sorted.map(r=>r.value),
            borderColor:lineColor, backgroundColor:lineColor+"18",
            borderWidth:2.5, pointRadius:5, pointBackgroundColor:lineColor,
            tension:0.3, fill:true
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            y:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'},ticks:{color:isDark?'#9ca3b0':'#6b7080',font:{size:11}}},
            x:{grid:{display:false},ticks:{color:isDark?'#9ca3b0':'#6b7080',font:{size:10},maxRotation:45}}
          }
        },
        plugins:[{id:'ref',afterDraw(chart){
          if(tt.min==null) return;

        plugins:{ legend:{labels:{color:isDark?'#9ca3b0':'#6b7080',font:{size:12}}} },
        scales:{
          y:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'},ticks:{color:isDark?'#9ca3b0':'#6b7080',font:{size:11}}},

            cx.beginPath(); cx.moveTo(left,yy); cx.lineTo(right,yy); cx.stroke(); cx.restore();
          });
        }
      }]

  };

  sel.addEventListener('change',drawCmp);
  setTimeout(drawCmp,50);

let aiResult = "";

async function runAI(mid){
  if(!cfg.aiKey){ showAIKey(); return; }
  const m = getMember(mid); if(!m) return;
  aiLoading=true; aiResult=""; currentView="ai"; render();

  const tests = mTests(mid);
  const visits = mVisits(mid);
  const tSum = tests.map(t=>{const tt=getTest(t.tid);return `${fmtD(t.date)}: ${tt?.name||"?"} = ${t.value} ${tt?.unit||""} (norma: ${tt?.min}-${tt?.max})`;}).join("\n");
  const vSum = visits.map(v=>{const dt=getDoc(v.did);return `${fmtD(v.date)}: ${dt?.name||"?"} — ${v.diagnosis||""}. ${v.notes||""}`;}).join("\n");
  const age = m.birthYear?(new Date().getFullYear()-m.birthYear):null;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
        messages:[{role:"user",content:`Sen tajribali oilaviy shifokor yordamchisisan. O'zbek tilida tahlil qil:
Bemor: ${m.name}, ${age?age+" yosh":"yoshi noma'lum"}, ${m.gender||""}
TAHLILLAR:\n${tSum||"(yo'q)"}
KO'RIKLAR:\n${vSum||"(yo'q)"}
1. 📊 UMUMIY XULOSA  2. ⚠️ OGOHLANTIRISH  3. 📅 TAVSIYALAR  4. 💊 SOGLOM TURMUSH  5. 🔔 ESLATMA
Oxirida: "Bu AI umumiy ma'lumot, shifokor maslahatini almashtirmaydi."`}]
      })
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
    aiResult = d.content?.map(c=>c.text||"").join("\n")||"Natija olinmadi";
  }catch(e){ aiResult="Xatolik: "+e.message; }
  aiLoading=false; render();

      // Validate
      const ext = file.name.split('.').pop().toLowerCase();
      const validImg = ['jpg','jpeg','png','webp','gif'];
      const validDoc = ['pdf'];
      if(!validImg.includes(ext) && !validDoc.includes(ext)){

      }
      if(file.size > 50*1024*1024){ toast("Fayl hajmi 50MB dan kichik bo'lishi kerak","error"); return; }

      // Show file name
      fileLabel.innerHTML = '';
      fileLabel.append(h('div',{style:{fontSize:"14px",fontWeight:"600",color:"var(--ac)"}},"✓ "+file.name));
      fileLabel.append(h('div',{style:{fontSize:"12px",color:"var(--tx3)",marginTop:"4px"}},(file.size/1024).toFixed(0)+" KB"));

      // Show loading
      statusDiv.style.display = "block";
      statusDiv.innerHTML = '';
      statusDiv.append(h('div',{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px",background:"var(--infl)",borderRadius:"var(--r)"}},
        h('div',{style:{width:"20px",height:"20px",border:"2px solid var(--br)",borderTopColor:"var(--inf)",borderRadius:"50%",animation:"sp 0.7s linear infinite",flexShrink:"0"}}),
        h('div',{style:{fontSize:"13px",color:"var(--inf)",fontWeight:"500"}},"AI tahlil natijalarini o'qimoqda...")
      ));

      // Detect media type from file content
      const mediaType = await detectMediaType(file);

      // Known test types for matching
      const knownTypes = D.testTypes.map(t=>({id:t.id,name:t.name,unit:t.unit,min:t.min,max:t.max}));

      try {
        // PDF: render pages as images to avoid API size limits
        let contentBlocks;
        if(mediaType==="application/pdf"){
          const pages = await pdfToImages(file);
          contentBlocks = pages.map(b64=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}));
        } else {
          const base64 = await new Promise((resolve,reject)=>{
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = () => reject(new Error("Fayl o'qishda xatolik"));
            reader.readAsDataURL(file);
          });
          contentBlocks = [{type:"image",source:{type:"base64",media_type:mediaType,data:base64}}];
        }

        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514", max_tokens:2000,
            messages:[{role:"user",content:[
              ...contentBlocks,
              {type:"text",text:`Bu laboratoriya tahlili natijasi. Iltimos, barcha ko'rsatkichlarni o'qib, JSON formatda chiqar.

Tizimdagi mavjud tahlil turlari:
${JSON.stringify(knownTypes)}

MUHIM QOIDALAR:
- Agar ko'rsatkich tizimdagi tahlil turiga mos kelsa, o'sha "id" ni ishlat
- Agar mos kelmasa, "id" ni null qil va "newName", "newUnit", "newMin", "newMax" maydonlarini to'ldir
- Faqat JSON qaytar, boshqa hech narsa yozma
- Raqamlarni to'g'ri o'qi

Javob formati (faqat JSON, boshqa text yo'q):
[
  {"id":"t1","value":5.4,"note":""},
  {"id":null,"value":12.3,"newName":"Kreatinin","newUnit":"mkmol/l","newMin":44,"newMax":97,"note":""}
]`}
            ]}]
          })
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);

        const text = data.content?.map(c=>c.text||"").join("")||"";
        // Extract JSON from response
        let jsonStr = text.trim();
        const jsonMatch = jsonStr.match(/\[[\s\S]*\]/);
        if(!jsonMatch) throw new Error("AI natija qaytarmadi");
        const results = JSON.parse(jsonMatch[0]);

        if(!Array.isArray(results)||results.length===0) throw new Error("Tahlil natijalari topilmadi");

        // Show results for confirmation
        statusDiv.style.display = "none";
        resultsDiv.style.display = "block";
        resultsDiv.innerHTML = '';
        resultsDiv.append(h('div',{style:{fontSize:"14px",fontWeight:"700",marginBottom:"10px"}},"Topilgan natijalar:"));

        const checkboxes = [];
        results.forEach((r,i)=>{
          const existing = r.id ? getTest(r.id) : null;
          const name = existing ? existing.name : (r.newName||"Noma'lum");
          const unit = existing ? existing.unit : (r.newUnit||"");
          const mn = existing ? existing.min : (r.newMin??null);
          const mx = existing ? existing.max : (r.newMax??null);

          const row = h('div',{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",background:"var(--card)",border:"1px solid var(--br)",borderRadius:"var(--r)",marginBottom:"6px"}});

          cb.checked = true;
          checkboxes.push({cb,r,existing,name,unit,mn,mx});

          const info = h('div',{style:{flex:"1",minWidth:"0"}});
          info.append(h('div',{style:{fontWeight:"600",fontSize:"13px"}},name));
          if(!existing) info.append(h('div',{style:{fontSize:"11px",color:"var(--inf)",fontWeight:"500"}},"Yangi tahlil turi"));
          const right = h('div',{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}});
          right.append(h('span',{html:`<b style="font-size:15px">${r.value}</b> <span style="font-size:11px;color:var(--tx3)">${unit}</span>`}));
          right.append(h('span',{html:badge(r.value,mn,mx)}));

          row.append(cb); row.append(info); row.append(right);
          resultsDiv.append(row);
        });

        resultsDiv.append(h('div',{style:{marginTop:"14px"}},
          btn("✓ Belgilanganlarni saqlash",()=>{
            const date = iDate.value;
            let saved = 0;
            checkboxes.forEach(({cb,r,existing,name,unit,mn,mx})=>{
              if(!cb.checked) return;
              let tid = r.id;
              // If new test type, create it
              if(!tid || !existing){
                tid = uid();
                D.testTypes.push({id:tid,name:name,unit:unit,min:mn,max:mx});
              }
              D.tests.push({id:uid(),mid,tid,value:r.value,date,note:r.note||""});
              saved++;
            });
            if(saved>0){
              saveData();
              toast(`${saved} ta natija saqlandi!`);
            }
            close(); render();
          },{full:true})
        ));

      } catch(e){
        statusDiv.innerHTML = '';
        statusDiv.append(h('div',{style:{padding:"12px",background:"var(--dnl)",borderRadius:"var(--r)",fontSize:"13px",color:"var(--dn)",fontWeight:"500"}},"Xatolik: "+e.message));
      }
    }
  });

      ));

      const knownDoctors = D.doctorTypes.map(d=>({id:d.id,name:d.name}));
      const promptText = `Bu shifokor ko'rigi hujjati. Quyidagi ma'lumotlarni JSON formatda chiqar.\n\nMavjud shifokor turlari:\n${JSON.stringify(knownDoctors)}\n\nQOIDALAR:\n- Shifokor turi mos kelsa "id" ni ishlat, mos kelmasa "id":null va "newDoctorName" ni to'ldir\n- Sanani YYYY-MM-DD formatda chiqar, topilmasa bugungi "${new Date().toISOString().split("T")[0]}"\n- Faqat JSON qaytar, boshqa text yozma\n\nFormat:\n{"id":"d1","newDoctorName":null,"date":"2026-04-30","diagnosis":"Tashxis","notes":"Tavsiyalar"}`;

      try {
        let messages;
        if(validDoc.includes(ext)){
          const docText = await extractDocxText(file);
          messages = [{role:"user",content:[{type:"text",text:`Hujjat matni:\n\n${docText}\n\n${promptText}`}]}];
        } else {
          const mt = await detectMediaType(file);
          let contentBlocks;
          if(mt==="application/pdf"){
            const pages = await pdfToImages(file);
            contentBlocks = pages.map(b64=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}));
          } else {
            const base64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error("Fayl o'qishda xatolik")); r.readAsDataURL(file); });
            contentBlocks = [{type:"image",source:{type:"base64",media_type:mt,data:base64}}];
          }
          messages = [{role:"user",content:[...contentBlocks,{type:"text",text:promptText}]}];
        }

        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":cfg.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages})
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        const text = data.content?.map(c=>c.text||"").join("")||"";
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("AI natija qaytarmadi");
        const result = JSON.parse(jsonMatch[0]);

        const existing = result.id ? getDoc(result.id) : null;
        const doctorName = existing ? existing.name : (result.newDoctorName||"Noma'lum shifokor");

        statusDiv.style.display="none";
        resultsDiv.style.display="block"; resultsDiv.innerHTML='';
        resultsDiv.append(h('div',{style:{fontSize:"14px",fontWeight:"700",marginBottom:"10px"}},"Topilgan ma'lumotlar:"));

        const card = h('div',{style:{background:"var(--card)",border:"1px solid var(--br)",borderRadius:"var(--rl)",padding:"14px",marginBottom:"10px"}});

        // Doctor select
        const dSel = h('select',{className:'inp',style:{fontSize:"13px",padding:"6px 10px",marginBottom:"10px"}});
        D.doctorTypes.forEach(d=>{ const o=h('option',{value:d.id},d.name); dSel.append(o); });
        if(!existing){ const o=h('option',{value:"__new"},"+ Yangi: "+doctorName); dSel.append(o); dSel.value="__new"; }
        else { dSel.value=result.id; }
        card.append(field("Shifokor turi",dSel));

        const dateInp = makeInput("date");
        dateInp.value = result.date||new Date().toISOString().split("T")[0];
        card.append(field("Sana",dateInp));

        const diagInp = makeInput("text","Tashxis");
        diagInp.value = result.diagnosis||"";
        card.append(field("Tashxis",diagInp));

        const notesInp = h('textarea',{className:'inp',placeholder:"Shifokor tavsiyalari..."});
        notesInp.value = result.notes||"";
        card.append(field("Tavsiyalar",notesInp));

        resultsDiv.append(card);
        resultsDiv.append(btn("✓ Saqlash",()=>{
          let did = dSel.value;
          if(did==="__new"){ did=uid(); D.doctorTypes.push({id:did,name:doctorName}); }
          D.visits.push({id:uid(),mid,did,date:dateInp.value,diagnosis:diagInp.value,notes:notesInp.value});
          saveData(); toast("Ko'rik saqlandi!"); close(); render();
        },{full:true}));

      } catch(e){
        statusDiv.innerHTML='';
        statusDiv.append(h('div',{style:{padding:"12px",background:"var(--dnl)",borderRadius:"var(--r)",fontSize:"13px",color:"var(--dn)",fontWeight:"500"}},"Xatolik: "+e.message));
      }
    }
  });
}

function showSettings(){
  showModal("Sozlamalar",(modal,close)=>{
    // Test types
    modal.append(h('div',{style:{fontSize:"14px",fontWeight:"600",marginBottom:"8px"}},"Tahlil turlari"));
    const ttDiv=h('div',{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}});
    D.testTypes.forEach(t=>{
      const chip=h('span',{style:{fontSize:"12px",background:"var(--sec)",padding:"5px 10px",borderRadius:"20px",display:"flex",alignItems:"center",gap:"6px"}},t.name);
      chip.append(h('button',{style:{border:"none",background:"none",cursor:"pointer",color:"var(--tx3)",fontSize:"14px"},onClick:()=>{D.testTypes=D.testTypes.filter(x=>x.id!==t.id);saveData();close();showSettings();}},"×"));
      ttDiv.append(chip);
    });
    modal.append(ttDiv);
    modal.append(h('div',{style:{marginBottom:"16px"}},btn("+ Tahlil turi",()=>{close();showAddTestType();},{outline:true,small:true})));

    // Doc types
    modal.append(h('div',{style:{fontSize:"14px",fontWeight:"600",marginBottom:"8px"}},"Shifokor turlari"));
    const dtDiv=h('div',{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}});
    D.doctorTypes.forEach(d=>{
      const chip=h('span',{style:{fontSize:"12px",background:"var(--sec)",padding:"5px 10px",borderRadius:"20px",display:"flex",alignItems:"center",gap:"6px"}},d.name);
      chip.append(h('button',{style:{border:"none",background:"none",cursor:"pointer",color:"var(--tx3)",fontSize:"14px"},onClick:()=>{D.doctorTypes=D.doctorTypes.filter(x=>x.id!==d.id);saveData();close();showSettings();}},"×"));
      dtDiv.append(chip);
    });
    modal.append(dtDiv);
    modal.append(h('div',{style:{marginBottom:"16px"}},btn("+ Shifokor turi",()=>{close();showAddDocType();},{outline:true,small:true})));

    // Share link
    const shareUrl = `${location.origin}${location.pathname}?o=${cfg.owner}&r=${cfg.repo}&t=${cfg.token}`;
    const shareCard = h('div',{style:{background:"var(--acl)",borderRadius:"var(--r)",padding:"12px 14px",marginBottom:"14px"}});
    shareCard.append(h('div',{style:{fontSize:"12px",fontWeight:"700",color:"var(--ac)",marginBottom:"6px"}},"🔗 Oila a'zolariga ulashish"));
    shareCard.append(h('div',{style:{fontSize:"11px",color:"var(--tx2)",lineHeight:"1.5",marginBottom:"8px"}},"Quyidagi havolani yuboring — oila a'zosi uni ochsa, hech narsa kiritmasdan to'g'ridan-to'g'ri kiradi."));
    const urlBox = h('div',{style:{background:"var(--card)",borderRadius:"var(--r)",padding:"8px 10px",fontSize:"11px",color:"var(--tx3)",wordBreak:"break-all",marginBottom:"8px",border:"1px solid var(--br)"}},shareUrl);
    shareCard.append(urlBox);
    shareCard.append(btn("📋 Havolani nusxalash",async()=>{
      try{ await navigator.clipboard.writeText(shareUrl); toast("Havola nusxalandi!"); }
      catch{ prompt("Havolani nusxalang:",shareUrl); }
    },{full:true,small:true}));
    modal.append(shareCard);

    // Actions
    const acts=h('div',{style:{borderTop:"1px solid var(--br)",paddingTop:"14px",display:"flex",gap:"8px",flexWrap:"wrap"}});
    acts.append(btn("⚡ AI sozlama",()=>{close();showAIKey();},{outline:true,small:true}));
    acts.append(btn("Chiqish",()=>{
      localStorage.removeItem(CONF_KEY); cfg=null; db=null; D=null; close(); render();
    },{outline:true,small:true,danger:true}));
    modal.append(acts);
  });
}

function showAddTestType(){
  showModal("Yangi tahlil turi",(modal,close)=>{
    const iName=makeInput("text","Eritrotsitlar");
    const iUnit=makeInput("text","10¹²/l");
    const iMin=makeInput("number",""); iMin.setAttribute("step","any");
    const iMax=makeInput("number",""); iMax.setAttribute("step","any");
    modal.append(field("Nomi",iName));
    modal.append(field("O'lchov birligi",iUnit));
    const row=h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
    row.append(field("Normal min",iMin));
    row.append(field("Normal max",iMax));
    modal.append(row);
    modal.append(btn("Qo'shish",()=>{
      if(!iName.value.trim()) return;
      D.testTypes.push({id:uid(),name:iName.value.trim(),unit:iUnit.value,min:parseFloat(iMin.value)||null,max:parseFloat(iMax.value)||null});
      saveData(); close(); render();
    },{full:true}));
  });
}

function showAddDocType(){
  showModal("Yangi shifokor turi",(modal,close)=>{
    const iName=makeInput("text","Otorinolaringolog");
    modal.append(field("Nomi",iName));
    modal.append(btn("Qo'shish",()=>{
      if(!iName.value.trim()) return;
      D.doctorTypes.push({id:uid(),name:iName.value.trim()});
      saveData(); close(); render();
    },{full:true}));
  });
}

function showAIKey(){
  showModal("⚡ AI sozlama",(modal,close)=>{
    modal.append(h('div',{html:`<div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:14px">AI tahlil uchun Anthropic API kaliti kerak. <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--ac);font-weight:600">console.anthropic.com</a> dan oling.</div>`}));
    const iKey=makeInput("password","sk-ant-api03-..."); iKey.value=cfg.aiKey||"";
    modal.append(field("API kaliti",iKey));
    modal.append(btn("Saqlash",()=>{
      saveCfg({...cfg,aiKey:iKey.value});
      toast("AI sozlandi!"); close();
    },{full:true}));
  });
}
